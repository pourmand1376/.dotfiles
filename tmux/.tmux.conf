# https://www.josean.com/posts/tmux-setup  
set -g default-terminal "tmux-256color"
set -g mouse on 
set -g base-index 1 # start windows numbering at 1
set -g history-limit 100000
# tpm plugin

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jimeh/tmux-themepack' 
set -g @themepack 'powerline/default/cyan'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# transparent panes (let the terminal background show through)
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# enable vim keybidings in scroll mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

## claude recommended settings to enable notifications 
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# Allow WezTerm notification sequences (OSC 9) to pass through tmux
set -as terminal-features ",xterm-256color:osc"
## https://code.claude.com/docs/en/terminal-config
# This automatically removes gaps in window numbers after you close a window.
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Transparent status bar. Runs AFTER tpm so it overrides the themepack.
set -g status-style 'bg=default'
